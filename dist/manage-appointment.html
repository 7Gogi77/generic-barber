<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravljanje termina</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/manage-appointment.css">
</head>
<body>
<div class="container">

    <div class="header">
        <h1>Upravljanje termina</h1>
        <p>Spremenite ali odpovedite svoj termin storitve</p>
    </div>

    <div class="content">

        <div id="alertMessage" class="alert"></div>

        <!-- Search -->
        <div id="searchSection" class="section active">
            <h2>Poiščite Svoj Termin</h2>
            <div class="search-box">
                <h3><i class="bi bi-search"></i> Vnesite podatke:</h3>
                <div class="search-group">
                    <input type="text"  id="searchEmail" placeholder="Email"                autocomplete="email">
                    <input type="tel"   id="searchPhone" placeholder="Telefonska številka" autocomplete="tel">
                </div>
                <div class="search-group">
                    <input type="text"  id="appointmentId" placeholder="ID Termina (opcijsko)">
                </div>
                <div class="search-actions">
                    <button class="btn btn-primary"   onclick="searchAppointment()"><i class="bi bi-search"></i> Poiščite Termin</button>
                    <button class="btn btn-secondary" onclick="clearSearch()"><i class="bi bi-x-lg"></i> Počisti</button>
                </div>
            </div>
        </div>

        <!-- Details -->
        <div id="detailsSection" class="section">
            <h2>Podrobnosti Termina</h2>

            <div id="appointmentDetails" class="appointment-details"></div>

            <!-- Reschedule -->
            <div id="rescheduleBox" class="reschedule-box">
                <h3><i class="bi bi-calendar-event"></i> Nov čas termina</h3>

                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button class="calendar-nav-btn" onclick="prevMonth()"><i class="bi bi-chevron-left"></i></button>
                        <button class="calendar-nav-btn" onclick="nextMonth()"><i class="bi bi-chevron-right"></i></button>
                    </div>
                    <div class="calendar-month-year" id="currentMonth"></div>
                </div>

                <div class="calendar-weekdays" id="weekdays"></div>
                <div class="calendar-days"     id="calendarDays"></div>

                <div class="time-slots-title">Izberite uro:</div>
                <div class="time-slots-grid"   id="timeSlots"></div>

                <button class="btn btn-primary" onclick="confirmReschedule()" style="width:100%;margin-top:16px;">
                    <i class="bi bi-check-circle"></i> Potrdi Nov Čas
                </button>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="goBack()"><i class="bi bi-arrow-left"></i> Nazaj</button>
                <button class="btn btn-warning"   onclick="toggleReschedule()"><i class="bi bi-calendar-check"></i> Nov čas</button>
                <button class="btn btn-danger"    onclick="cancelAppointment()"><i class="bi bi-x-circle"></i> Odpoved</button>
            </div>
        </div>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/storage-manager.js?v=3"></script>
<script src="js/sms-handler.js"></script>
<script src="js/email-handler.js"></script>
<script src="js/manage-appointment.js?v=2"></script>
</body>
</html>
