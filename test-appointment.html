<!DOCTYPE html>
<html>
<head>
    <title>Test Termin</title>
</head>
<body>
    <h1>Test Kreiranja Termina</h1>
    <button onclick="createTestAppointment()">Kreiraj Test Termin</button>
    <button onclick="checkAppointments()">Provjeri Termine</button>
    <button onclick="goToAdmin()">Idi na Admin Panel</button>
    
    <pre id="output"></pre>
    
    <script>
        function createTestAppointment() {
            const testAppointment = {
                date: "2026-01-30",
                time: "14:00",
                firstName: "Test",
                surname: "Korisnik",
                fullName: "Test Korisnik",
                email: "test@example.com",
                phone: "+38612345678",
                services: ["Haircut"],
                totalDuration: 30,
                totalPrice: 20,
                id: Date.now()
            };
            
            try {
                if (typeof window.addScheduleEvent === 'function') {
                    window.addScheduleEvent({
                        id: `apt_${testAppointment.id}`,
                        title: testAppointment.fullName,
                        start: `${testAppointment.date}T${testAppointment.time}`,
                        end: new Date(new Date(`${testAppointment.date}T${testAppointment.time}`).getTime() + (testAppointment.totalDuration || 60) * 60000).toISOString(),
                        extendedProps: {
                            isBooking: true,
                            customer: testAppointment.fullName,
                            email: testAppointment.email,
                            phone: testAppointment.phone,
                            services: testAppointment.services,
                            duration: testAppointment.totalDuration,
                            price: testAppointment.totalPrice
                        }
                    });
                } else if (typeof StorageManager !== 'undefined' && StorageManager.load) {
                    const schedule = await StorageManager.load('schedule');
                    schedule.events = schedule.events || [];
                    schedule.events.push({
                        id: `apt_${testAppointment.id}`,
                        title: testAppointment.fullName,
                        start: `${testAppointment.date}T${testAppointment.time}`,
                        end: new Date(new Date(`${testAppointment.date}T${testAppointment.time}`).getTime() + (testAppointment.totalDuration || 60) * 60000).toISOString(),
                        extendedProps: { isBooking: true, customer: testAppointment.fullName }
                    });
                    await StorageManager.save('schedule', schedule);
                }
            } catch (e) {
                console.warn('Could not save test appointment to schedule', e);
            }
            
            document.getElementById('output').textContent = 'Test termin kreiran:\n' + JSON.stringify(testAppointment, null, 2);
            console.log('✓ Test termin kreiran');
        }
        
        function checkAppointments() {
            try {
                const schedule = await StorageManager.load('schedule');
                const bookings = (schedule && Array.isArray(schedule.events)) ? schedule.events.filter(e => e.extendedProps?.isBooking) : [];
                document.getElementById('output').textContent = 'Termini v schedule:\n' + JSON.stringify(bookings, null, 2);
                console.log('Termini:', bookings);
            } catch (e) {
                document.getElementById('output').textContent = 'Could not load bookings: ' + e.message;
            }
        }
        
        function goToAdmin() {
            window.location.href = 'admin-panel.html';
        }
        
        // Check on load
        window.addEventListener('load', checkAppointments);
    </script>
</body>
</html>
