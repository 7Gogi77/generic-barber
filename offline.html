<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ni povezave - Barber Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A0A0A 0%, #1C1C1E 100%);
            color: #FFFFFF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 24px;
            text-align: center;
        }
        
        .offline-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            opacity: 0.8;
        }
        
        .offline-icon svg {
            width: 100%;
            height: 100%;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #8E8E93;
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .retry-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
        }
        
        .retry-btn:active {
            transform: translateY(0);
        }
        
        .contact-info {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .contact-info p {
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
        
        .phone {
            color: #007AFF;
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="offline-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke="#FF3B30" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>
    
    <h1>Ni internetne povezave</h1>
    <p>Preverite svojo internetno povezavo in poskusite znova. Vaši shranjeni podatki so varni.</p>
    
    <button class="retry-btn" onclick="window.location.reload()">
        Poskusi znova
    </button>
    
    <div class="contact-info">
        <p>Za rezervacije nas lahko pokličete:</p>
        <a href="tel:+38641123456" class="phone">041 123 456</a>
    </div>
    
    <script>
        // Auto-retry when online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
