<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravljanje termina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Search Section */
        .search-box {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .search-box h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .search-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-warning {
            background: #ffa94d;
            color: white;
        }

        .btn-warning:hover {
            background: #ff9933;
        }

        /* Appointment Details */
        .appointment-details {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .appointment-details h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
        }

        .detail-value {
            color: #333;
            text-align: right;
        }

        /* Reschedule Section */
        .reschedule-box {
            background: #f0f7ff;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
        }

        .reschedule-box h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .date-time-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .date-time-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Alert Messages */
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Actions */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons .btn {
            flex: 1;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .search-group {
                grid-template-columns: 1fr;
            }

            .search-actions {
                flex-direction: column;
            }

            .date-time-group {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Upravljanje termina</h1>
            <p>Spremenite ali odpovedite svoj termin</p>
        </div>

        <div class="content">
            <!-- Alert Messages -->
            <div id="alertMessage" class="alert"></div>

            <!-- Search Section -->
            <div id="searchSection" class="section active">
                <h2 style="margin-bottom: 20px; color: #333;">Poiščite Svoj Termin</h2>
                
                <div class="search-box">
                    <h3>Vnesite podatke:</h3>
                    <div class="search-group">
                        <input 
                            type="text" 
                            id="searchEmail" 
                            placeholder="Email" 
                            autocomplete="email"
                        >
                        <input 
                            type="tel" 
                            id="searchPhone" 
                            placeholder="Telefonska številka" 
                            autocomplete="tel"
                        >
                    </div>
                    <div class="search-group">
                        <input 
                            type="text" 
                            id="appointmentId" 
                            placeholder="ID Termina (opcijsko)" 
                        >
                    </div>
                    <div class="search-actions">
                        <button class="btn btn-primary" onclick="searchAppointment()">Poiščite Termin</button>
                        <button class="btn btn-secondary" onclick="clearSearch()">Počisti</button>
                    </div>
                </div>
            </div>

            <!-- Appointment Details Section -->
            <div id="detailsSection" class="section">
                <h2 style="margin-bottom: 20px; color: #333;">Podrobnosti Termina</h2>
                
                <div id="appointmentDetails" class="appointment-details"></div>

                <!-- Reschedule Section -->
                <div class="reschedule-box">
                    <h3>📅 Preusmeri Termin</h3>
                    <div class="date-time-group">
                        <input 
                            type="date" 
                            id="newDate" 
                            min="" 
                            required
                        >
                        <input 
                            type="time" 
                            id="newTime" 
                            required
                        >
                    </div>
                    <button class="btn btn-primary" onclick="rescheduleAppointment()" style="width: 100%;">
                        Potrdite Novo Uro
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-warning" onclick="goBack()" style="flex: 1;">↩️ Nazaj</button>
                    <button class="btn btn-danger" onclick="cancelAppointment()" style="flex: 1;">❌ Odpoved</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/storage-manager.js?v=3"></script>
    <script src="js/sms-handler.js"></script>
    
    <script>
        let currentAppointment = null;

        // Show Alert
        function showAlert(message, type = 'info') {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = `alert show alert-${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    alertEl.classList.remove('show');
                }, 5000);
            }
        }

        // Hide Alert
        function hideAlert() {
            document.getElementById('alertMessage').classList.remove('show');
        }

        // Set Min Date to Today
        function initMinDate() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('newDate').min = dateStr;
        }

        // Format Phone Number for Comparison
        function formatPhoneForSearch(phone) {
            if (!phone) return '';
            // Remove spaces, dashes, etc.
            let cleaned = phone.replace(/[\s\-()]/g, '');
            // Handle Slovenia numbers: 031... or 0316... or +386...
            if (cleaned.startsWith('0')) {
                cleaned = '+386' + cleaned.substring(1);
            } else if (cleaned.startsWith('386')) {
                cleaned = '+' + cleaned;
            }
            return cleaned;
        }

        // Search Appointment
        async function searchAppointment() {
            const email = document.getElementById('searchEmail').value.trim().toLowerCase();
            const phone = document.getElementById('searchPhone').value.trim();
            const appointmentId = document.getElementById('appointmentId').value.trim();

            if (!email && !phone && !appointmentId) {
                showAlert('Molim vnesite email ali telefonske številke', 'error');
                return;
            }

            try {
                showAlert('Iskanje...', 'info');
                
                const scheduleData = await StorageManager.load('schedule') || { events: [] };
                const events = scheduleData.events || [];

                // Format search phone
                const searchPhone = phone ? formatPhoneForSearch(phone) : '';

                let found = null;

                for (const event of events) {
                    const isSameId = appointmentId && event.id === appointmentId;
                    const isSameEmail = email && event.extendedProps.email?.toLowerCase() === email;
                    const isSamePhone = phone && formatPhoneForSearch(event.extendedProps.phone) === searchPhone;

                    if (isSameId || isSameEmail || isSamePhone) {
                        found = event;
                        break;
                    }
                }

                if (!found) {
                    showAlert('Termin ni najden. Preverite podatke.', 'error');
                    return;
                }

                currentAppointment = found;
                displayAppointmentDetails(found);
                
                showSection('detailsSection');
                hideAlert();

            } catch (error) {
                console.error('Search error:', error);
                showAlert('Prišlo je do napake: ' + error.message, 'error');
            }
        }

        // Display Appointment Details
        function displayAppointmentDetails(event) {
            const startDate = new Date(event.start);
            const endDate = new Date(event.end);
            
            const dateStr = startDate.toLocaleDateString('sl-SI', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const timeStr = `${startDate.getHours().toString().padStart(2, '0')}:${startDate.getMinutes().toString().padStart(2, '0')} - ${endDate.getHours().toString().padStart(2, '0')}:${endDate.getMinutes().toString().padStart(2, '0')}`;
            
            const services = (event.extendedProps.services || []).join(', ');
            const price = event.extendedProps.price ? `€${event.extendedProps.price.toFixed(2)}` : 'N/A';

            const html = `
                <div class="detail-row">
                    <span class="detail-label">👤 Stranka:</span>
                    <span class="detail-value">${event.extendedProps.customer || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📅 Datum:</span>
                    <span class="detail-value">${dateStr}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">⏰ Ura:</span>
                    <span class="detail-value">${timeStr}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💇 Storitve:</span>
                    <span class="detail-value">${services || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💰 Cena:</span>
                    <span class="detail-value">${price}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📧 Email:</span>
                    <span class="detail-value" style="font-size: 12px;">${event.extendedProps.email || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📱 Telefon:</span>
                    <span class="detail-value">${event.extendedProps.phone || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">ID Termina:</span>
                    <span class="detail-value" style="font-size: 12px; font-family: monospace;">${event.id}</span>
                </div>
            `;

            document.getElementById('appointmentDetails').innerHTML = html;

            // Set default new date/time to current appointment time
            const currentDate = new Date(event.start);
            document.getElementById('newDate').value = currentDate.toISOString().split('T')[0];
            document.getElementById('newTime').value = `${currentDate.getHours().toString().padStart(2, '0')}:${currentDate.getMinutes().toString().padStart(2, '0')}`;
        }

        // Reschedule Appointment
        async function rescheduleAppointment() {
            if (!currentAppointment) return;

            const newDateStr = document.getElementById('newDate').value;
            const newTimeStr = document.getElementById('newTime').value;

            if (!newDateStr || !newTimeStr) {
                showAlert('Molim vnesite novo uro', 'error');
                return;
            }

            try {
                showAlert('Spreminjan termin...', 'info');

                // Create new start/end times
                const [year, month, day] = newDateStr.split('-');
                const [hours, minutes] = newTimeStr.split(':');

                const newStart = new Date(year, month - 1, day, hours, minutes);
                const newEnd = new Date(newStart);
                const oldStart = new Date(currentAppointment.start);
                const oldEnd = new Date(currentAppointment.end);
                newEnd.setMinutes(newEnd.getMinutes() + (oldEnd - oldStart) / 60000);

                // Update appointment
                currentAppointment.start = newStart.toISOString();
                currentAppointment.end = newEnd.toISOString();

                // Save to storage
                const scheduleData = await StorageManager.load('schedule') || { events: [] };
                const index = scheduleData.events.findIndex(e => e.id === currentAppointment.id);
                
                if (index !== -1) {
                    scheduleData.events[index] = currentAppointment;
                    await StorageManager.save('schedule', scheduleData);
                }

                // Send SMS notification
                if (currentAppointment.extendedProps.phone) {
                    try {
                        const message = `Termin pri ${window.SITE_CONFIG?.businessName || 'Aaa'} je bil spremenjen na: ${newDateStr} ob ${newTimeStr}. Hvala!`;
                        await window.SMSHandler.sendSMS(
                            currentAppointment.extendedProps.phone,
                            message
                        );
                    } catch (smsError) {
                        console.warn('SMS failed:', smsError);
                    }
                }

                showAlert('✅ Termin je bil uspešno spremenjen! SMS obvestilo je bilo послано.', 'success');
                
                setTimeout(() => {
                    clearSearch();
                }, 3000);

            } catch (error) {
                console.error('Reschedule error:', error);
                showAlert('Napaka pri spreminjanju termina: ' + error.message, 'error');
            }
        }

        // Cancel Appointment
        async function cancelAppointment() {
            if (!currentAppointment) return;

            if (!confirm('Ste prepričani, da želite odpovedati termin?')) {
                return;
            }

            try {
                showAlert('Odpoved termina...', 'info');

                // Remove from storage
                const scheduleData = await StorageManager.load('schedule') || { events: [] };
                scheduleData.events = scheduleData.events.filter(e => e.id !== currentAppointment.id);
                await StorageManager.save('schedule', scheduleData);

                // Send SMS notification
                if (currentAppointment.extendedProps.phone) {
                    try {
                        const message = `Vaš termin pri ${window.SITE_CONFIG?.businessName || 'Aaa'} je bil odpovedan. Če ste to naredili po pomoti, nas kontaktirajte.`;
                        await window.SMSHandler.sendSMS(
                            currentAppointment.extendedProps.phone,
                            message
                        );
                    } catch (smsError) {
                        console.warn('SMS failed:', smsError);
                    }
                }

                showAlert('✅ Termin je bil odpovedan. SMS obvestilo je bilo poslano.', 'success');
                
                setTimeout(() => {
                    clearSearch();
                }, 3000);

            } catch (error) {
                console.error('Cancel error:', error);
                showAlert('Napaka pri odpovedi: ' + error.message, 'error');
            }
        }

        // Clear Search
        function clearSearch() {
            currentAppointment = null;
            document.getElementById('searchEmail').value = '';
            document.getElementById('searchPhone').value = '';
            document.getElementById('appointmentId').value = '';
            hideAlert();
            showSection('searchSection');
        }

        // Go Back
        function goBack() {
            clearSearch();
        }

        // Show Section
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // Read query param
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initMinDate();

            const idFromUrl = getQueryParam('id');
            if (idFromUrl) {
                document.getElementById('appointmentId').value = idFromUrl;
                searchAppointment();
            }
            
            // Allow Enter key to search
            document.getElementById('searchEmail').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchAppointment();
            });
            document.getElementById('searchPhone').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchAppointment();
            });
        });
    </script>
</body>
</html>
