<!DOCTYPE html>
<html lang="sl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Business | Professional Services</title>
    <link id="favicon" rel="icon" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/config.js"></script>
    <script>window.SITE_CONFIG = window.SITE_CONFIG || {};</script>
    <script src="js/admin.js"></script>
    <script>window.AdminManager = window.AdminManager || {};</script>
    <script type="module" src="js/firebase-config.js"></script>
    <script>
        const FORMSPREE_ENDPOINT = "https://formspree.io/f/meegkorn";
    </script>
    <style>
        /* ============================================
           MODERN CLEAN DESIGN SYSTEM
           ============================================ */
        :root {
            --accent: #007AFF;
            --accent-rgb: 0, 122, 255;
            --accent-light: rgba(0, 122, 255, 0.1);
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --bg-tertiary: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #636366;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(28, 28, 30, 0.85);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            /* Extended theme variables */
            --button-color: #007AFF;
            --button-text-color: #FFFFFF;
            --nav-text-color: #8E8E93;
            --nav-hover-color: #007AFF;
            --footer-bg-color: #0A0A0A;
            --footer-text-color: #636366;
            --gradient-start: #007AFF;
            --gradient-end: #5AC8FA;
            --subtitle-color: #007AFF;
            --color-primary: #007AFF;
            --scrollbar-track: #1C1C1E;
            --scrollbar-thumb: #007AFF;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: color-mix(in srgb, var(--scrollbar-thumb) 80%, white);
        }
        
        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom cursor - desktop only */
        #cursor {
            display: none;
        }
        
        @media (hover: hover) and (min-width: 769px) {
            body { cursor: none; }
            #cursor {
                display: block;
                position: fixed;
                width: 24px;
                height: 24px;
                border: 2px solid var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: transform 0.1s ease, border-color 0.2s ease, opacity 0.2s ease;
                mix-blend-mode: difference;
            }
            #cursor.hover {
                transform: translate(-50%, -50%) scale(1.5);
                border-color: var(--text-primary);
            }
        }
        
        /* ============================================
           TYPOGRAPHY
           ============================================ */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600;
            line-height: 1.2;
        }
        
        .display-xl {
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: -0.02em;
        }
        
        .display-lg {
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -0.02em;
        }
        
        .display-md {
            font-size: clamp(1.5rem, 3vw, 2rem);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, white) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--subtitle-color);
        }
        
        /* ============================================
           LAYOUT
           ============================================ */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        .section {
            padding: 100px 0;
            position: relative;
        }
        
        @media (max-width: 768px) {
            .section { padding: 60px 0; }
            .container { padding: 0 16px; }
        }
        
        /* ============================================
           NAVIGATION
           ============================================ */
        #main-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-normal);
        }
        
        #main-nav.scrolled {
            padding: 12px 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }
        
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        
        .nav-logo:hover { color: var(--accent); }
        .nav-logo img { max-height: 40px; width: auto; }
        
        #nav-links-container {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        #nav-links-container a {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--nav-text-color);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color var(--transition-fast);
            position: relative;
        }
        
        #nav-links-container a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--nav-hover-color);
            transition: width var(--transition-normal);
        }
        
        #nav-links-container a:hover { color: var(--nav-hover-color); }
        #nav-links-container a:hover::after { width: 100%; }
        
        #nav-book-btn {
            background: var(--button-color);
            color: var(--button-text-color);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3);
        }
        
        #nav-book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(var(--accent-rgb), 0.4);
        }
        
        /* Mobile Navigation */
        .nav-mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
        }
        
        @media (max-width: 768px) {
            #main-nav { padding: 16px; }
            #main-nav.scrolled { padding: 12px 16px; }
            #nav-links-container { display: none; }
            .nav-mobile-toggle { display: block; }
            #nav-book-btn { padding: 10px 16px; font-size: 0.7rem; }
        }
        
        /* ============================================
           HERO SECTION
           ============================================ */
        #home {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            transition: transform 0.5s ease;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(10, 10, 10, 0.4) 0%,
                rgba(10, 10, 10, 0.7) 50%,
                rgba(10, 10, 10, 0.9) 100%
            );
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 24px;
            max-width: 900px;
        }
        
        .hero-content .subtitle {
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }
        
        .hero-content h1 {
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }
        
        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all var(--transition-normal);
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }
        
        .hero-cta:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        
        .hero-cta svg {
            width: 20px;
            height: 20px;
            transition: transform var(--transition-fast);
        }
        
        .hero-cta:hover svg { transform: translateX(4px); }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s infinite;
        }
        
        .scroll-indicator span {
            display: block;
            width: 24px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            position: relative;
        }
        
        .scroll-indicator span::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            width: 4px;
            height: 8px;
            background: var(--accent);
            border-radius: 2px;
            transform: translateX(-50%);
            animation: scrollDown 1.5s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        
        @keyframes scrollDown {
            0% { opacity: 1; top: 8px; }
            100% { opacity: 0; top: 20px; }
        }
        
        /* ============================================
           ABOUT SECTION
           ============================================ */
        #about { background: var(--bg-primary); }
        
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }
        
        .about-image { position: relative; }
        
        .about-image img {
            width: 100%;
            height: auto;
            border-radius: var(--radius-lg);
            filter: grayscale(30%);
            transition: all var(--transition-slow);
        }
        
        .about-image:hover img {
            filter: grayscale(0%);
            transform: scale(1.02);
        }
        
        .about-image::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            width: 100px;
            height: 100px;
            border-top: 3px solid var(--accent);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius-md) 0 0 0;
            opacity: 0.5;
        }
        
        .about-content .subtitle { margin-bottom: 12px; }
        .about-content h2 { margin-bottom: 24px; }
        
        .about-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        
        .accent-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 2px;
        }
        
        @media (max-width: 768px) {
            .about-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .about-image::before { display: none; }
        }
        
        /* ============================================
           TESTIMONIAL SECTION
           ============================================ */
        .testimonial-section {
            background: var(--bg-secondary);
            text-align: center;
        }
        
        .testimonial-quote {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            font-style: italic;
            color: var(--text-primary);
            max-width: 800px;
            margin: 0 auto 24px;
            line-height: 1.6;
        }
        
        .testimonial-quote::before {
            content: '"';
            display: block;
            font-size: 4rem;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
        }
        
        .testimonial-author {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        
        /* ============================================
           SERVICES SECTION
           ============================================ */
        #services { background: var(--bg-primary); }
        
        .services-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .services-header h2 { color: var(--accent); }
        
        #services-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 24px 0;
            border-bottom: 1px solid var(--border-color);
            transition: all var(--transition-fast);
        }
        
        .service-item:hover {
            border-color: var(--accent);
            padding-left: 16px;
        }
        
        .service-info h4 {
            font-size: 1.25rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        
        .service-info p {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .service-price {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent);
        }
        
        /* ============================================
           TEAM SECTION
           ============================================ */
        #barbers { background: var(--bg-secondary); }
        
        .team-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        #barbers-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
        }
        
        .team-member {
            text-align: center;
            transition: transform var(--transition-normal);
        }
        
        .team-member:hover { transform: translateY(-8px); }
        
        .team-member-image {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
        }
        
        .team-member-image img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            filter: grayscale(50%);
            transition: all var(--transition-slow);
        }
        
        .team-member:hover .team-member-image img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }
        
        .team-member h4 {
            font-size: 1.25rem;
            color: var(--accent);
            margin-bottom: 4px;
        }
        
        .team-member p {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        /* ============================================
           GALLERY SECTION
           ============================================ */
        #gallery {
            background: var(--bg-primary);
            padding: 80px 0;
        }
        
        #gallery-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }
        
        #gallery-list img {
            width: 100%;
            height: auto;
            border-radius: var(--radius-md);
            filter: grayscale(30%);
            transition: all var(--transition-normal);
            cursor: pointer;
        }
        
        #gallery-list img:hover {
            filter: grayscale(0%);
            transform: scale(1.02);
        }
        
        /* ============================================
           CTA SECTION
           ============================================ */
        .cta-section {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            text-align: center;
            padding: 80px 0;
        }
        
        .cta-section h2 {
            color: white;
            margin-bottom: 16px;
        }
        
        .cta-section p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 32px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: var(--bg-primary);
            padding: 16px 32px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            transition: all var(--transition-fast);
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .cta-button svg {
            width: 18px;
            height: 18px;
        }
        
        /* ============================================
           FOOTER
           ============================================ */
        footer {
            background: var(--footer-bg-color);
            padding: 60px 0 40px;
            border-top: 1px solid var(--border-color);
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }
        
        .footer-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .footer-links {
            display: flex;
            gap: 24px;
        }
        
        .footer-links a {
            color: var(--footer-text-color);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color var(--transition-fast);
        }
        
        .footer-links a:hover { color: var(--accent); }
        
        #footer-copy {
            width: 100%;
            text-align: center;
            color: var(--footer-text-color);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }
        
        @media (max-width: 768px) {
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .footer-links { flex-wrap: wrap; justify-content: center; }
        }
        
        /* ============================================
           REVEAL ANIMATIONS
           ============================================ */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .hero-content h1 { font-size: 2rem; }
            .hero-cta { padding: 14px 24px; font-size: 0.75rem; }
            .section { padding: 50px 0; }
            .scroll-indicator { display: none; }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div id="cursor"></div>

    <!-- Navigation -->
    <nav id="main-nav">
        <a href="#home" class="nav-logo" id="logo-text"></a>
        <div id="nav-links-container"></div>
        <a href="rezervacija.html" id="nav-book-btn">Rezerviraj</a>
    </nav>

    <!-- Hero Section -->
    <section id="home">
        <div class="hero-bg">
            <img id="hero-img-src" src="" alt="Hero Background">
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-content">
            <span class="subtitle" id="hero-sub"></span>
            <h1 class="display-xl" id="hero-main"></h1>
            <a href="rezervacija.html" id="hero-btn" class="hero-cta">
                <span>Rezerviraj Termin</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                </svg>
            </a>
        </div>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section reveal">
        <div class="container">
            <div class="about-grid">
                <div class="about-image">
                    <img id="story-img" src="" alt="About Us">
                </div>
                <div class="about-content">
                    <span class="subtitle" id="story-section-label"></span>
                    <h2 class="display-lg" id="story-title"></h2>
                    <p id="story-text"></p>
                    <div class="accent-line"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Testimonial Section -->
    <section class="section testimonial-section reveal">
        <div class="container">
            <p class="testimonial-quote" id="test-quote"></p>
            <span class="testimonial-author" id="test-author"></span>
        </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="section reveal">
        <div class="container">
            <div class="services-header">
                <h2 class="display-md" id="services-title"></h2>
            </div>
            <div id="services-list"></div>
        </div>
    </section>

    <!-- Team Section -->
    <section id="barbers" class="section reveal">
        <div class="container">
            <div class="team-header">
                <h2 class="display-md" id="barbers-title"></h2>
            </div>
            <div id="barbers-list"></div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="reveal">
        <div class="container">
            <div id="gallery-list"></div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="cta-section reveal">
        <div class="container">
            <h2 class="display-md" id="cta-title">Pripravljeni na Spremembo?</h2>
            <p id="cta-text">Rezervirajte svoj termin danes in doživite našo profesionalno storitev.</p>
            <a href="rezervacija.html" class="cta-button">
                <span id="cta-button-text">Rezerviraj Zdaj</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand" id="footer-brand"></div>
                <div class="footer-links" id="footer-links"></div>
            </div>
            <div id="footer-copy"></div>
        </div>
    </footer>

    <!-- Hidden Formspree form -->
    <form id="formspreeForm" action="https://formspree.io/f/meegkorn" method="POST" style="display:none;">
        <input type="email" name="email" id="formspreeEmail">
        <input type="text" name="Ime" id="formspreeIme">
        <input type="text" name="Priimek" id="formspreePriimek">
        <input type="text" name="Telefon" id="formspreeTelefon">
        <input type="text" name="Datum" id="formspreeDatum">
        <input type="text" name="Cas" id="formspreeCas">
        <input type="text" name="Storitve" id="formspreeStoritve">
        <input type="text" name="Cena" id="formspreeCena">
        <input type="text" name="Trajanje" id="formspreeTrajanje">
    </form>

    <script>
        // ============================================
        // SITE INITIALIZATION
        // ============================================
        
        async function loadSavedConfig() {
            const saved = localStorage.getItem('site_config_backup');
            if (saved) {
                try {
                    const config = JSON.parse(saved);
                    Object.assign(SITE_CONFIG, config);
                    applyThemeColors();
                } catch (e) {
                    console.log('Using default config');
                }
            }
        }
        
        function applyThemeColors() {
            const t = SITE_CONFIG.theme || {};
            const root = document.documentElement;
            
            // Map config theme to CSS variables
            const primary = t.primary || '#007AFF';
            root.style.setProperty('--accent', primary);
            
            // Extract RGB for box-shadow alpha
            const hex2rgb = (hex) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '0, 122, 255';
            };
            root.style.setProperty('--accent-rgb', hex2rgb(primary));
            root.style.setProperty('--accent-light', `${primary}15`);
            
            // Background colors
            root.style.setProperty('--bg-primary', t.dark || '#0A0A0A');
            root.style.setProperty('--bg-secondary', t.card || '#141414');
            
            // Text colors
            root.style.setProperty('--text-primary', t.textPrimary || '#FFFFFF');
            root.style.setProperty('--text-secondary', t.textSecondary || '#8E8E93');
            
            // Gradient colors
            root.style.setProperty('--gradient-start', t.gradientStart || primary);
            root.style.setProperty('--gradient-end', t.gradientEnd || '#5AC8FA');
            
            // Button colors
            root.style.setProperty('--button-color', t.buttonColor || primary);
            root.style.setProperty('--button-text-color', t.buttonTextColor || '#FFFFFF');
            
            // Navigation colors
            root.style.setProperty('--nav-text-color', t.navTextColor || '#8E8E93');
            root.style.setProperty('--nav-hover-color', t.navHoverColor || primary);
            
            // Footer colors
            root.style.setProperty('--footer-bg-color', t.footerBgColor || '#0A0A0A');
            root.style.setProperty('--footer-text-color', t.footerTextColor || '#636366');
            
            // Subtitle (hero-sub) color - uses primary accent
            root.style.setProperty('--subtitle-color', t.primary || primary);
            root.style.setProperty('--color-primary', t.primary || primary);
            
            // Scrollbar colors - uses config values or primary accent
            root.style.setProperty('--scrollbar-track', t.scrollbarTrack || t.dark || '#1C1C1E');
            root.style.setProperty('--scrollbar-thumb', t.scrollbarThumb || primary);
        }
        
        async function loadFromFirebase() {
            try {
                if (window.CloudSync && typeof window.CloudSync.loadFromCloud === 'function') {
                    const sdkLoaded = await window.CloudSync.loadFromCloud();
                    if (sdkLoaded) {
                        return true;
                    }
                }

                const dbUrl = 'https://barber-shop-9b2ac-default-rtdb.europe-west1.firebasedatabase.app/site_config.json';
                const response = await fetch(dbUrl, { cache: 'no-store' });
                if (response.ok) {
                    const cloudConfig = await response.json();
                    if (cloudConfig) {
                        Object.assign(SITE_CONFIG, cloudConfig);
                        localStorage.setItem('site_config_backup', JSON.stringify(SITE_CONFIG));
                        console.log('✅ Loaded config from Firebase (REST)');
                        return true;
                    }
                } else {
                    console.warn(`⚠️ Firebase REST fetch failed: ${response.status} ${response.statusText}`);
                }
            } catch (error) {
                console.log('⚠️ Firebase unavailable, using local config', error);
                if (error && error.message) {
                    console.warn('Firebase error detail:', error.message);
                }
            }
            return false;
        }
        
        function renderSiteContent() {
            // Page title & favicon
            document.title = SITE_CONFIG.shopName + ' | Professional Services';
            const favicon = document.getElementById('favicon');
            if (SITE_CONFIG.logo && SITE_CONFIG.logo.mini) {
                favicon.href = SITE_CONFIG.logo.mini;
            }
            
            // Apply theme colors
            applyThemeColors();
            
            // Logo
            const logoEl = document.getElementById('logo-text');
            const showLogo = SITE_CONFIG.logo && SITE_CONFIG.logo.showLogo !== false;
            if (showLogo && SITE_CONFIG.logo && SITE_CONFIG.logo.large) {
                logoEl.innerHTML = `<img src="${SITE_CONFIG.logo.large}" alt="${SITE_CONFIG.shopName}">`;
            } else {
                logoEl.innerText = SITE_CONFIG.shopName;
            }
            
            // Hero
            document.getElementById('hero-sub').innerText = SITE_CONFIG.hero.subtitle;
            document.getElementById('hero-main').innerText = SITE_CONFIG.hero.title;
            const heroBtnSpan = document.getElementById('hero-btn').querySelector('span');
            if (heroBtnSpan) heroBtnSpan.innerText = SITE_CONFIG.hero.buttonText || 'Rezerviraj Termin';
            document.getElementById('hero-img-src').src = SITE_CONFIG.hero.backgroundImage;
            
            // About
            document.getElementById('story-section-label').innerText = SITE_CONFIG.ourStory.sectionTitle;
            document.getElementById('story-title').innerText = SITE_CONFIG.ourStory.title;
            document.getElementById('story-text').innerText = SITE_CONFIG.ourStory.text;
            document.getElementById('story-img').src = SITE_CONFIG.ourStory.image;
            
            // Testimonial
            document.getElementById('test-quote').innerText = SITE_CONFIG.testimonial.quote;
            document.getElementById('test-author').innerText = `— ${SITE_CONFIG.testimonial.author}`;
            
            // Navigation links
            const navContainer = document.getElementById('nav-links-container');
            navContainer.innerHTML = '';
            SITE_CONFIG.navLinks.forEach(item => {
                const link = document.createElement('a');
                link.href = item.link;
                link.innerText = item.name;
                navContainer.appendChild(link);
            });
            document.getElementById('nav-book-btn').innerText = SITE_CONFIG.navButtonText;
            
            // Services
            document.getElementById('services-title').innerText = SITE_CONFIG.servicesSection.title;
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            SITE_CONFIG.servicesSection.items.forEach(s => {
                const item = document.createElement('div');
                item.className = 'service-item';
                item.innerHTML = `
                    <div class="service-info">
                        <h4>${s.name}</h4>
                        <p>${s.desc}</p>
                    </div>
                    <span class="service-price">${s.price}€</span>
                `;
                servicesList.appendChild(item);
            });
            
            // Team
            document.getElementById('barbers-title').innerText = SITE_CONFIG.barbersSection.title;
            const barbersList = document.getElementById('barbers-list');
            barbersList.innerHTML = '';
            SITE_CONFIG.barbersSection.list.forEach(b => {
                const member = document.createElement('div');
                member.className = 'team-member';
                member.innerHTML = `
                    <div class="team-member-image">
                        <img src="${b.img}" alt="${b.name}">
                    </div>
                    <h4>${b.name}</h4>
                    <p>${b.role}</p>
                `;
                barbersList.appendChild(member);
            });
            
            // Gallery
            const galleryList = document.getElementById('gallery-list');
            galleryList.innerHTML = '';
            SITE_CONFIG.gallery.forEach(img => {
                const imgEl = document.createElement('img');
                imgEl.src = img;
                imgEl.alt = 'Gallery Image';
                galleryList.appendChild(imgEl);
            });
            
            // Footer
            document.getElementById('footer-brand').innerText = SITE_CONFIG.shopName;
            const footerLinks = document.getElementById('footer-links');
            footerLinks.innerHTML = '';
            SITE_CONFIG.navLinks.forEach(item => {
                const link = document.createElement('a');
                link.href = item.link;
                link.innerText = item.name;
                footerLinks.appendChild(link);
            });
            const footerCopyText = SITE_CONFIG.footerCopy || 'Vse pravice pridržane.';
            document.getElementById('footer-copy').innerHTML = `© ${new Date().getFullYear()} ${SITE_CONFIG.shopName}. ${footerCopyText}`;
            
            // CTA Section
            if (SITE_CONFIG.ctaSection) {
                document.getElementById('cta-title').innerText = SITE_CONFIG.ctaSection.title || 'Pripravljeni na Spremembo?';
                document.getElementById('cta-text').innerText = SITE_CONFIG.ctaSection.text || 'Rezervirajte svoj termin danes in doživite našo profesionalno storitev.';
                document.getElementById('cta-button-text').innerText = SITE_CONFIG.ctaSection.buttonText || 'Rezerviraj Zdaj';
            }
        }
        
        async function initSite() {
            await loadSavedConfig();
            await loadFromFirebase();
            renderSiteContent();
        }
        
        // ============================================
        // CURSOR
        // ============================================
        const cursor = document.getElementById('cursor');
        
        if (window.matchMedia('(hover: hover)').matches && window.innerWidth > 768) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            
            function addCursorHover() {
                document.querySelectorAll('a, button, .service-item, .team-member, #gallery-list img').forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
                });
            }
            
            // Add after content loads
            setTimeout(addCursorHover, 500);
        }
        
        // ============================================
        // REVEAL ANIMATION
        // ============================================
        function reveal() {
            document.querySelectorAll('.reveal').forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                const revealPoint = 100;
                
                if (elementTop < windowHeight - revealPoint) {
                    el.classList.add('active');
                }
            });
        }
        
        // ============================================
        // SCROLL EFFECTS
        // ============================================
        let ticking = false;
        
        function onScroll() {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    // Nav background
                    const nav = document.getElementById('main-nav');
                    if (window.scrollY > 50) {
                        nav.classList.add('scrolled');
                    } else {
                        nav.classList.remove('scrolled');
                    }
                    
                    // Hero parallax
                    const heroImg = document.getElementById('hero-img-src');
                    if (heroImg && window.scrollY < window.innerHeight) {
                        heroImg.style.transform = `scale(1.05) translateY(${window.scrollY * 0.15}px)`;
                    }
                    
                    reveal();
                    ticking = false;
                });
                ticking = true;
            }
        }
        
        window.addEventListener('scroll', onScroll, { passive: true });
        
        // ============================================
        // INIT
        // ============================================
        initSite();
        reveal();
    </script>
</body>
</html>
